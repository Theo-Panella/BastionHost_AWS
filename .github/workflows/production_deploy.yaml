name: "Deploy for AWS in Production enviroment"
on:
  pull_request:
    branches:
      - main
    
jobs:
  Configuration:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "defining ssh credentials for ec2"
        run: |
          mkdir .ssh 
          echo "${{ secrets.SSH_KEY_EC2_AWS_PRIVATE }}" > .ssh/terraform-key
          echo "${{ secrets.SSH_KEY_EC2_AWS }}" > .ssh/terraform-key.pub
          chmod 600 .ssh/terraform-key
          chmod 644 .ssh/terraform-key.pub

      - name: "Configure AWS credentials"
        uses:  aws-actions/Configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ARN }}
          aws-region: us-west-2

      - name: "Running applies"
        uses: hashicorp/setup-terraform@v3
        with: 
          terraform_version: 1.9.0

      - name: "terraform init"
        run: terraform init

      - name: "terraform plan"
        run: terraform plan -auto-approve

      - name: "Confirm apply"
        id: interactive-inputs
        uses: boasihq/interactive-inputs@v2
        with: 
          ngrok-authtoken: ${{ secrets.NGROK_AUTH_KEY }}
          timeout: 160
          title: "Confirm de plan workflow, to make sure that the productions enviroment are ok"
          interactive: |
            fields:
              - label: overview
                properties:
                  type: textarea
                  description: confirm the apply comand for terraform
                  defaultvalue: Confirm the apply for terraform, be sure about your decision
                  readOnly: yes
              - label: verify
                properties:
                  display: Check "yes" if you want to proceed with the terraform apply in branch main
                  defaultvalue: false
                  type: boolean
                  required: true

      - name: "terraform apply"
        run: terraform apply -auto-approve 